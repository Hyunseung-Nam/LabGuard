services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: labguard
      POSTGRES_PASSWORD: labguard
      POSTGRES_DB: labguard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labguard"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://labguard:labguard@db:5432/labguard

volumes:
  pgdata:
